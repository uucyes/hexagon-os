<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HEXAGON.OS</title>
  <style>
    :root {
      --bg-color: #050505; --neon-mint: #00ffcc; --neon-gold: #ffd700;
      --text-main: #ffffff; --text-dim: #888888; --card-bg: #141414;
    }
    body {
      margin: 0; padding: 20px; background-color: var(--bg-color); color: var(--text-main);
      font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center;
    }
    header { text-align: center; margin-bottom: 20px; width: 100%; border-bottom: 1px solid #333; padding-bottom: 15px; }
    h1 { margin: 0; font-size: 1.5rem; color: var(--neon-mint); letter-spacing: 3px; text-shadow: 0 0 10px rgba(0,255,204,0.3); }
    .subtitle { font-size: 0.8rem; color: var(--text-dim); margin-top: 5px; letter-spacing: 1px; }

    /* 레이더 차트 컨테이너 */
    .chart-container {
      width: 100%; max-width: 320px; height: 320px; background: var(--card-bg);
      border-radius: 10px; border: 1px solid #222; display: flex; justify-content: center; align-items: center;
      margin-bottom: 30px; position: relative; box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
    }
    canvas { display: block; }

    /* 네비게이션 버튼 그리드 */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 320px; }
    
    .module-btn {
      background: #1a1a1a; color: var(--neon-mint); border: 1px solid #333; padding: 18px 0;
      border-radius: 8px; text-align: center; text-decoration: none; font-weight: bold; font-size: 1rem;
      letter-spacing: 1px; transition: all 0.3s; position: relative; overflow: hidden;
    }
    .module-btn:active { transform: scale(0.95); }
    .module-btn.locked { color: #555; border-color: #222; background: #0a0a0a; pointer-events: none; }
    .module-btn.locked::after {
      content: 'COMPLETED'; position: absolute; bottom: 5px; left: 0; right: 0; font-size: 0.6rem; color: #444;
    }

    #loading { color: var(--neon-mint); font-weight: bold; margin-top: 50px; letter-spacing: 2px; }
  </style>
</head>
<body>

  <header>
    <h1>HEXAGON.OS</h1>
    <div class="subtitle">ANNUAL PROGRESS TRACKER</div>
  </header>

  <div id="loading">SYNCHRONIZING DATA...</div>

  <div id="dashboard" style="display:none; width:100%; flex-direction:column; align-items:center;">
    
    <div class="chart-container">
      <canvas id="radarChart" width="300" height="300"></canvas>
    </div>

    <div class="grid">
      <a href="strength.html" class="module-btn" id="btn-strength">STRENGTH</a>
      <a href="stamina.html" class="module-btn" id="btn-stamina">STAMINA</a>
      <a href="reading.html" class="module-btn" id="btn-intellect">INTELLECT</a>
      <a href="charm.html" class="module-btn" id="btn-charm">CHARM</a>
      <a href="vitality.html" class="module-btn" id="btn-vitality">VITALITY</a>
      <a href="legal.html" class="module-btn" id="btn-legal">LEGAL</a>
    </div>

  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyuMPRaNEUCrr3FLjPDuQBgdOM1GTsPD8KG9g1-AN01NPv9k75VqIGSEXggUvavniyh/exec";

    window.onload = function() {
      fetch(GAS_URL + "?action=getDashboardData")
        .then(res => res.json())
        .then(data => {
          if(data.success) {
            applyLocks(data.locks);
            drawHexagonChart(data.yearlyStats, data.targets);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
          } else {
            document.getElementById('loading').innerText = "SYSTEM ERROR";
          }
        }).catch(() => {
          document.getElementById('loading').innerText = "NETWORK ERROR";
        });
    };

    function applyLocks(locks) {
      if(locks.strength) document.getElementById('btn-strength').classList.add('locked');
      if(locks.stamina) document.getElementById('btn-stamina').classList.add('locked');
      if(locks.intellect) document.getElementById('btn-intellect').classList.add('locked');
      if(locks.charm) document.getElementById('btn-charm').classList.add('locked');
      if(locks.vitality) document.getElementById('btn-vitality').classList.add('locked');
      if(locks.legal) document.getElementById('btn-legal').classList.add('locked');
    }

    // 캔버스 레이더 차트 렌더링 (오버클럭 엔진 포함)
    function drawHexagonChart(stats, targets) {
      const canvas = document.getElementById('radarChart');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const cx = canvas.width / 2;
      const cy = canvas.height / 2 + 10;
      const R = 90; // 100% 한계선 반지름

      // 시계 방향: 12시부터
      const categories = ['근력', '체력', '매력', '활력', '법력', '독서'];
      const angles = [-Math.PI/2, -Math.PI/6, Math.PI/6, Math.PI/2, 5*Math.PI/6, 7*Math.PI/6];

      // 1. 배경 가이드라인 (거미줄) 그리기
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 1;
      for (let level = 0.2; level <= 1.0; level += 0.2) {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          let x = cx + R * level * Math.cos(angles[i]);
          let y = cy + R * level * Math.sin(angles[i]);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      }

      // 2. 축 및 텍스트 라벨 그리기
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let i = 0; i < 6; i++) {
        let x = cx + R * Math.cos(angles[i]);
        let y = cy + R * Math.sin(angles[i]);
        ctx.strokeStyle = '#333';
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(x, y); ctx.stroke();

        let labelX = cx + (R + 30) * Math.cos(angles[i]);
        let labelY = cy + (R + 25) * Math.sin(angles[i]);
        
        ctx.font = 'bold 12px sans-serif';
        ctx.fillStyle = '#888';
        ctx.fillText(categories[i], labelX, labelY - 8);
        
        let statVal = stats[categories[i]] || 0;
        let targetVal = targets[categories[i]] || 1;
        ctx.font = '10px Courier New';
        ctx.fillStyle = 'var(--neon-mint)';
        ctx.fillText(`${statVal} / ${targetVal}`, labelX, labelY + 8);
      }

      // 3. 누적 데이터 폴리곤(도형) 그리기
      ctx.beginPath();
      let points = [];
      for (let i = 0; i < 6; i++) {
        let cat = categories[i];
        let ratio = (stats[cat] || 0) / (targets[cat] || 1);
        let drawRatio = ratio; // 초과 달성 시 100% 범위를 뚫고 나감
        
        let px = cx + R * drawRatio * Math.cos(angles[i]);
        let py = cy + R * drawRatio * Math.sin(angles[i]);
        points.push({x: px, y: py, ratio: ratio});
        
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      
      ctx.fillStyle = 'rgba(0, 255, 204, 0.2)';
      ctx.fill();
      ctx.strokeStyle = 'var(--neon-mint)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // 4. 오버클럭(초과 달성) 노드 발광 효과
      for (let i = 0; i < 6; i++) {
        let p = points[i];
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        
        if (p.ratio >= 1.0) {
          // 목표 달성 및 초과 시: 황금색(Gold) 발광 효과
          ctx.fillStyle = 'var(--neon-gold)';
          ctx.shadowColor = 'var(--neon-gold)';
          ctx.shadowBlur = 15;
          ctx.fill();
        } else {
          // 진행 중: 기본 민트색
          ctx.fillStyle = 'var(--neon-mint)';
          ctx.shadowBlur = 0;
          ctx.fill();
        }
        ctx.shadowBlur = 0; // 초기화
      }
    }
  </script>
</body>
</html>
