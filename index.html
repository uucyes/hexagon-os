<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HEXAGON.OS - COMMAND CENTER</title>
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker Registered'))
          .catch(err => console.log('Service Worker Registration Failed', err));
      });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --p: #00ffcc; --bg: #050505; --card: #141414; --border: #333; --text: #fff; --mute: #666; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
    .header { width: 100%; max-width: 420px; text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; font-size: 20px; font-weight: 900; letter-spacing: 4px; color: var(--p); }

    .chart-container { width: 100%; max-width: 350px; aspect-ratio: 1; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 15px; box-sizing: border-box; margin-bottom: 20px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.05); }

    /* [Daily HUD] 상단 3x2 배열 유지 */
    .hud-container { width: 100%; max-width: 420px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .hud-box { background: #111; border: 1px solid var(--border); border-radius: 6px; padding: 10px; text-align: center; font-size: 13px; font-weight: bold; color: var(--mute); transition: 0.3s; cursor: pointer; }
    .hud-box.on { border-color: var(--p); color: #000; background: var(--p); box-shadow: 0 0 10px rgba(0, 255, 204, 0.4); }

    /* 피드백 컨트롤 패널 */
    .control-panel { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
    .btn-action { background: transparent; border: 1px solid var(--p); color: var(--p); padding: 14px; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
    .btn-action:active { background: var(--p); color: #000; }
    
    .ai-group { display: flex; gap: 5px; }
    .btn-ai { flex: 1; background: #111; border: 1px solid #555; color: #aaa; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; }
    .btn-ai:active { background: #333; }

    /* 모달 레이어 */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
    .modal-content { background: var(--card); border: 1px solid var(--border); border-top: 4px solid var(--p); border-radius: 8px; padding: 20px; width: 100%; max-width: 420px; max-height: 80vh; overflow-y: auto; }
    .modal-title { font-size: 16px; font-weight: bold; color: var(--p); margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    .modal-body { font-size: 14px; line-height: 1.6; color: #ccc; margin-bottom: 20px; word-break: keep-all; white-space: pre-wrap; }
    .modal-close { width: 100%; background: #333; color: #fff; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    
    .modal-input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 4px; box-sizing: border-box; margin-bottom: 20px; }
    .modal-btn { width: 100%; background: var(--p); border: none; color: #000; font-weight: bold; padding: 12px; border-radius: 4px; cursor: pointer; }

    /* 그리드 매트릭스 테이블 */
    .grid-table { width: 100%; border-collapse: collapse; font-size: 11px; color: #888; text-align: center; }
    .grid-table th { padding: 5px; font-weight: normal; border-bottom: 1px solid #333; }
    .grid-table td { padding: 4px; }
    .grid-cell { width: 14px; height: 14px; background: #222; border-radius: 2px; display: inline-block; }
    .grid-cell.lv1 { background: rgba(0, 255, 204, 0.4); }
    .grid-cell.lv2 { background: rgba(0, 255, 204, 0.7); }
    .grid-cell.lv3 { background: rgba(0, 255, 204, 1.0); box-shadow: 0 0 5px var(--p); }

    #loading { color: var(--p); font-weight: bold; text-align: center; padding: 50px; }
  </style>
</head>
<body>

  <div class="header">HEXAGON.OS</div>

  <div id="loading">서버 통신망 연결 및 데이터 동기화 중...</div>

  <div id="mainDashboard" style="display:none; width:100%; flex-direction:column; align-items:center;">
    <div class="chart-container">
      <canvas id="radarChart"></canvas>
    </div>

    <div style="width:100%; max-width:420px; font-size:12px; color:var(--p); margin-bottom:10px; font-weight:bold;">[ DAILY STATUS ]</div>
    <div class="hud-container" id="hudContainer">
      <div class="hud-box" id="hud-strength" onclick="nav('strength.html')">근력 (STR)</div>
      <div class="hud-box" id="hud-charm" onclick="nav('charm.html')">매력 (CHM)</div>
      <div class="hud-box" id="hud-stamina" onclick="nav('stamina.html')">체력 (STA)</div>
      <div class="hud-box" id="hud-intellect" onclick="nav('intellect.html')">지력 (INT)</div>
      <div class="hud-box" id="hud-vitality" onclick="nav('vitality.html')">활력 (VIT)</div>
      <div class="hud-box" id="hud-legal" onclick="nav('legal.html')">법력 (LGL)</div>
    </div>

    <div style="width:100%; max-width:420px; font-size:12px; color:#aaa; margin-bottom:10px; font-weight:bold;">[ DATA & STRATEGY ]</div>
    <div class="control-panel">
      <button class="btn-action" onclick="showGrid()">데이터 매트릭스 (최근 14일)</button>
      <div class="ai-group">
        <button class="btn-ai" onclick="requestAI('일간')">일간 마감 브리핑</button>
        <button class="btn-ai" onclick="requestAI('주간')">주간 동향 분석</button>
        <button class="btn-ai" onclick="requestAI('월간')">월간 전략 평가</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="gridModal">
    <div class="modal-content">
      <div class="modal-title">누적 성취도 매트릭스 (최근 14일)</div>
      <div style="overflow-x:auto; margin-bottom:20px;">
        <table class="grid-table" id="gridTable"></table>
      </div>
      <button class="modal-close" onclick="closeModal('gridModal')">닫기</button>
    </div>
  </div>

  <div class="modal-overlay" id="aiModal">
    <div class="modal-content">
      <div class="modal-title" id="aiTitle">AI 전략 브리핑</div>
      <div class="modal-body" id="aiBody">데이터를 분석하고 있습니다...</div>
      <button class="modal-close" onclick="closeModal('aiModal')">확인 및 종료</button>
    </div>
  </div>

  <div class="modal-overlay" id="apiKeyModal">
    <div class="modal-content">
      <div class="modal-title">AI 보안 인증 (최초 1회)</div>
      <div class="modal-body">Gemini 2.5 API 키를 입력해 주십시오. (기기 내부에만 안전하게 저장됩니다.)</div>
      <input type="text" id="apiKeyInput" class="modal-input" placeholder="AIzaSy...">
      <button class="modal-btn" onclick="saveApiKey()">인증 및 저장</button>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyuMPRaNEUCrr3FLjPDuQBgdOM1GTsPD8KG9g1-AN01NPv9k75VqIGSEXggUvavniyh/exec";
    const API_STORAGE_KEY = 'hexagon_gemini_api_key';

    let myChart = null;
    let globalGridData = null;
    let globalLabels = null;
    let globalStats = null;
    let pendingAIType = null;

    window.onload = function() {
      fetch(API_URL + "?action=getDashboardData")
        .then(response => response.json())
        .then(res => {
          if(!res.success) { alert("데이터 로드 실패: " + res.error); return; }
          
          document.getElementById('loading').style.display = 'none';
          document.getElementById('mainDashboard').style.display = 'flex';

          const ctx = document.getElementById('radarChart').getContext('2d');
          myChart = new Chart(ctx, {
            type: 'radar',
            data: {
              labels: ['근력', '매력', '체력', '독서', '활력', '법력'],
              datasets: [{
                data: res.chartData,
                backgroundColor: 'rgba(0, 255, 204, 0.2)',
                borderColor: 'rgba(0, 255, 204, 1)',
                borderWidth: 2,
                pointBackgroundColor: 'rgba(0, 255, 204, 1)'
              }]
            },
            options: {
              responsive: true, maintainAspectRatio: false,
              scales: {
                r: { min: 0, max: 100, ticks: { display: false }, grid: { color: '#333' }, angleLines: { color: '#333' }, pointLabels: { color: '#fff', font: { size: 12, weight: 'bold' } } }
              },
              plugins: { legend: { display: false } }
            }
          });

          if(res.locks.strength) document.getElementById('hud-strength').classList.add('on');
          if(res.locks.charm) document.getElementById('hud-charm').classList.add('on');
          if(res.locks.stamina) document.getElementById('hud-stamina').classList.add('on');
          if(res.locks.intellect) document.getElementById('hud-intellect').classList.add('on');
          if(res.locks.vitality) document.getElementById('hud-vitality').classList.add('on');
          if(res.locks.legal) document.getElementById('hud-legal').classList.add('on');

          globalGridData = res.grid;
          globalLabels = res.labels;
          globalStats = res.stats;
        })
        .catch(error => { document.getElementById('loading').innerText = "통신 오류 발생."; });
    };

    function nav(page) {
      window.location.href = page;
    }

    function showGrid() {
      if(!globalGridData) return;
      const table = document.getElementById('gridTable');
      let html = '<tr><th></th>';
      globalLabels.forEach(lbl => { html += `<th>${lbl}</th>`; });
      html += '</tr>';

      const cats = ['근력', '매력', '체력', '독서', '법력', '활력'];
      cats.forEach(cat => {
        html += `<tr><td style="text-align:left; font-weight:bold; color:#fff;">${cat}</td>`;
        Object.keys(globalGridData).sort().forEach(dateStr => {
          let count = globalGridData[dateStr][cat] || 0;
          let lvClass = '';
          if(count === 1) lvClass = 'lv1';
          else if(count === 2) lvClass = 'lv2';
          else if(count >= 3) lvClass = 'lv3';
          html += `<td><div class="grid-cell ${lvClass}"></div></td>`;
        });
        html += '</tr>';
      });

      table.innerHTML = html;
      document.getElementById('gridModal').style.display = 'flex';
    }

    function requestAI(type) {
      const savedKey = localStorage.getItem(API_STORAGE_KEY);
      if (!savedKey) {
        pendingAIType = type;
        document.getElementById('apiKeyModal').style.display = 'flex';
      } else {
        executeAIBriefing(savedKey, type);
      }
    }

    function saveApiKey() {
      const keyInput = document.getElementById('apiKeyInput').value.trim();
      if (keyInput === "") { alert("키를 입력하십시오."); return; }
      localStorage.setItem(API_STORAGE_KEY, keyInput);
      document.getElementById('apiKeyModal').style.display = 'none';
      if(pendingAIType) executeAIBriefing(keyInput, pendingAIType);
    }

    function executeAIBriefing(apiKey, type) {
      document.getElementById('aiTitle').innerText = `AI 전략 브리핑 (${type})`;
      document.getElementById('aiBody').innerHTML = `<span style="color:var(--p);">데이터를 분석하고 참모망에 연결 중입니다...</span>`;
      document.getElementById('aiModal').style.display = 'flex';

      let stats = globalStats[type];
      let prompt = `당신은 HEXAGON.OS의 수석 전략 AI 참모입니다. 사용자의 ${type} 훈련 데이터를 바탕으로 전략적인 브리핑을 제공하세요.\n`;
      prompt += `[${type} 데이터 요약]\n- 총 훈련 횟수: ${stats.total}회\n`;
      prompt += `- 근력: ${stats.cat['근력']}회, 매력: ${stats.cat['매력']}회, 체력: ${stats.cat['체력']}회, 지력(독서): ${stats.cat['독서']}회, 법력: ${stats.cat['법력']}회, 활력: ${stats.cat['활력']}회\n\n`;
      prompt += `지시사항:\n1. 편향된 부분이나 누락된 부분을 정밀하게 지적하십시오.\n2. 다음 기간의 최우선 과제를 제안하십시오.\n3. 짧고 명확한 비즈니스 어조로 작성하고, 사용자를 '대표님'이라고 호칭하십시오.`;

      const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + apiKey;
      fetch(url, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ "contents": [{ "parts": [{"text": prompt}] }] })
      })
      .then(response => response.json())
      .then(data => {
        if (data.candidates && data.candidates.length > 0) {
          document.getElementById('aiBody').innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, "<br>");
        } else if (data.error) {
          document.getElementById('aiBody').innerHTML = `<span style="color:var(--danger);">API 통신 거절: ${data.error.message}</span>`;
          localStorage.removeItem(API_STORAGE_KEY); 
        }
      })
      .catch(err => { document.getElementById('aiBody').innerHTML = `<span style="color:var(--danger);">통신 오류 발생</span>`; });
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
  </script>
</body>
</html>
