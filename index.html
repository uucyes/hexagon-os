<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HEXAGON.OS // CYBERPUNK EDITION</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    :root {
      --bg-dark: #0a0510; --cyan: #00e5ff; --magenta: #ff00ff; --gold: #ffd700;
      --strength: #ff3366; --stamina: #00ffcc; --intellect: #00bfff; 
      --charm: #ff00aa; --vitality: #ffcc00; --legal: #b026ff;
      --card-bg: rgba(20, 10, 30, 0.85);
    }

    body {
      margin: 0; padding: 20px; background: radial-gradient(circle at center, #1a0b2e 0%, var(--bg-dark) 100%);
      color: #fff; font-family: 'Share Tech Mono', monospace, sans-serif; 
      display: flex; flex-direction: column; align-items: center; min-height: 100vh; position: relative;
    }

    body::before {
      content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none;
    }

    header { text-align: center; margin-bottom: 20px; width: 100%; border-bottom: 1px solid rgba(0, 229, 255, 0.4); padding-bottom: 15px; position: relative; z-index: 5; }
    
    h1 { 
      margin: 0; font-size: 1.8rem; color: #fff; letter-spacing: 4px;
      text-shadow: 2px 0 var(--cyan), -2px 0 var(--magenta); font-weight: bold;
    }
    .subtitle { font-size: 0.8rem; color: var(--cyan); margin-top: 5px; letter-spacing: 2px; text-shadow: 0 0 5px var(--cyan); }

    .chart-container {
      width: 100%; max-width: 320px; height: 320px; background: var(--card-bg);
      border-radius: 15px; border: 1px solid rgba(176, 38, 255, 0.5); display: flex; justify-content: center; align-items: center;
      margin-bottom: 25px; position: relative; box-shadow: 0 0 25px rgba(0, 229, 255, 0.2); z-index: 5;
    }
    canvas { display: block; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 320px; z-index: 5; position: relative; }
    
    .module-btn {
      background: rgba(10, 5, 20, 0.6); border: 1px solid #333; padding: 16px 0;
      border-radius: 8px; text-align: center; text-decoration: none; font-weight: bold; font-size: 1.2rem;
      letter-spacing: 2px; transition: 0.3s; position: relative; overflow: hidden; line-height: 1.2;
      backdrop-filter: blur(5px); font-family: 'Malgun Gothic', sans-serif; /* 한글 가독성 고려 */
    }
    .module-btn span.eng { font-size: 0.75rem; color: #aaa; display: block; margin-top: 5px; letter-spacing: 1px; font-family: 'Share Tech Mono', monospace; }
    .module-btn:active { transform: scale(0.95); }
    
    .btn-strength { color: var(--strength); border-color: var(--strength); box-shadow: 0 0 10px rgba(255, 51, 102, 0.3); }
    .btn-stamina { color: var(--stamina); border-color: var(--stamina); box-shadow: 0 0 10px rgba(0, 255, 204, 0.3); }
    .btn-intellect { color: var(--intellect); border-color: var(--intellect); box-shadow: 0 0 10px rgba(0, 191, 255, 0.3); }
    .btn-charm { color: var(--charm); border-color: var(--charm); box-shadow: 0 0 10px rgba(255, 0, 170, 0.3); }
    .btn-vitality { color: var(--vitality); border-color: var(--vitality); box-shadow: 0 0 10px rgba(255, 204, 0, 0.3); }
    .btn-legal { color: var(--legal); border-color: var(--legal); box-shadow: 0 0 10px rgba(176, 38, 255, 0.3); }

    .module-btn.locked { color: #555 !important; border-color: #333 !important; box-shadow: none !important; background: rgba(0,0,0,0.8); pointer-events: none; }
    .module-btn.locked span.eng { color: #444; }
    .module-btn.locked::after { content: 'LOCKED'; position: absolute; bottom: 3px; left: 0; right: 0; font-size: 0.6rem; color: #ff0033; letter-spacing: 2px; }

    .report-btn {
      background: rgba(0, 229, 255, 0.1); color: var(--cyan); border: 1px dashed var(--cyan); padding: 12px;
      border-radius: 8px; text-align: center; font-size: 0.9rem; font-weight: bold; letter-spacing: 1px;
      width: 100%; max-width: 320px; margin-top: 25px; cursor: pointer; transition: 0.2s; z-index: 5; position: relative;
    }
    .report-btn:active { background: var(--cyan); color: #000; }

    #report-section {
      width: 100%; max-width: 320px; margin-top: 15px; background: rgba(0, 0, 0, 0.85);
      border: 1px solid var(--cyan); border-radius: 8px; padding: 15px; box-sizing: border-box; 
      display: none; z-index: 5; position: relative; box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
    }
    .report-title { font-size: 0.9rem; color: var(--cyan); font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }
    .report-row { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px; color: #ccc; }
    .report-row span.val { color: #fff; font-weight: bold; text-shadow: 0 0 5px rgba(255,255,255,0.5); }

    .ai-btn { background: transparent; border: 1px solid var(--magenta); color: var(--magenta); width: 100%; padding: 10px; margin-top: 15px; border-radius: 4px; font-family: inherit; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .ai-btn:active { background: var(--magenta); color: #000; }
    .ai-terminal { margin-top: 10px; font-size: 0.8rem; color: #00ff00; line-height: 1.5; min-height: 60px; background: #050505; padding: 10px; border: 1px solid #333; border-radius: 4px; word-break: keep-all; }
    .blink { animation: blinker 1s linear infinite; }
    @keyframes blinker { 50% { opacity: 0; } }

    #loading { color: var(--cyan); font-weight: bold; margin-top: 50px; letter-spacing: 2px; text-shadow: 0 0 10px var(--cyan); z-index: 5; position: relative;}
  </style>
</head>
<body>

  <header>
    <h1>OCTAGON.OS</h1>
    <div class="subtitle">SYS_TRACKER_V2.0_ONLINE</div>
  </header>

  <div id="loading">DECRYPTING BIO-DATA...<span class="blink">_</span></div>

  <div id="dashboard" style="display:none; width:100%; flex-direction:column; align-items:center;">
    
    <div class="chart-container">
      <canvas id="radarChart" width="300" height="300"></canvas>
    </div>

    <div class="grid">
      <a href="strength.html" class="module-btn btn-strength" id="btn-strength">근력<span class="eng">[ STR ]</span></a>
      <a href="stamina.html" class="module-btn btn-stamina" id="btn-stamina">체력<span class="eng">[ STA ]</span></a>
      <a href="intellect.html" class="module-btn btn-intellect" id="btn-intellect">지력<span class="eng">[ INT ]</span></a>
      <a href="charm.html" class="module-btn btn-charm" id="btn-charm">매력<span class="eng">[ CHM ]</span></a>
      <a href="vitality.html" class="module-btn btn-vitality" id="btn-vitality">활력<span class="eng">[ VIT ]</span></a>
      <a href="legal.html" class="module-btn btn-legal" id="btn-legal">법력<span class="eng">[ LEG ]</span></a>
    </div>

    <div class="report-btn" onclick="toggleReport()">[ 터미널: 데이터 리포트 접속 ]</div>

    <div id="report-section">
      <div class="report-title">> LOG_STATS: WEEK & MONTH</div>
      <div id="report-content"></div>
      <button class="ai-btn" onclick="requestAIAnalysis()">[ AI 전술 분석 요청 ]</button>
      <div id="ai-output" class="ai-terminal">대기 중...<span class="blink">_</span></div>
    </div>

  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyuMPRaNEUCrr3FLjPDuQBgdOM1GTsPD8KG9g1-AN01NPv9k75VqIGSEXggUvavniyh/exec";
    let dashboardStats = null;

    window.onload = function() {
      fetch(GAS_URL + "?action=getDashboardData")
        .then(res => res.json())
        .then(data => {
          if(data.success) {
            if(data.yearlyStats['독서'] !== undefined) { data.yearlyStats['지력'] = data.yearlyStats['독서']; }
            if(data.targets['독서'] !== undefined) { data.targets['지력'] = data.targets['독서']; }
            if(data.stats['주간'].cat['독서'] !== undefined) { data.stats['주간'].cat['지력'] = data.stats['주간'].cat['독서']; delete data.stats['주간'].cat['독서']; }
            if(data.stats['월간'].cat['독서'] !== undefined) { data.stats['월간'].cat['지력'] = data.stats['월간'].cat['독서']; delete data.stats['월간'].cat['독서']; }
            
            dashboardStats = data.stats;
            applyLocks(data.locks);
            drawHexagonChart(data.yearlyStats, data.targets);
            renderReport();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
          } else {
            document.getElementById('loading').innerHTML = "<span style='color:red'>SYS ERROR: DATA CORRUPTED</span>";
          }
        }).catch(() => {
          document.getElementById('loading').innerHTML = "<span style='color:red'>SYS ERROR: NETWORK OFFLINE</span>";
        });
    };

    function applyLocks(locks) {
      if(locks.strength) document.getElementById('btn-strength').classList.add('locked');
      if(locks.stamina) document.getElementById('btn-stamina').classList.add('locked');
      if(locks.intellect) document.getElementById('btn-intellect').classList.add('locked');
      if(locks.charm) document.getElementById('btn-charm').classList.add('locked');
      if(locks.vitality) document.getElementById('btn-vitality').classList.add('locked');
      if(locks.legal) document.getElementById('btn-legal').classList.add('locked');
    }

    function toggleReport() {
      const reportDiv = document.getElementById('report-section');
      reportDiv.style.display = (reportDiv.style.display === 'none' || reportDiv.style.display === '') ? 'block' : 'none';
    }

    function renderReport() {
      if(!dashboardStats) return;
      const content = document.getElementById('report-content');
      
      let html = `<div class="report-row" style="margin-top:5px; border-bottom:1px dashed #444; padding-bottom:5px;"><span style="color:var(--cyan)">[ 7 DAYS TOTAL ]</span><span class="val" style="color:var(--cyan)">${dashboardStats['주간'].total} Pts</span></div>`;
      for(let cat in dashboardStats['주간'].cat) {
        if(dashboardStats['주간'].cat[cat] > 0) html += `<div class="report-row"><span>- ${cat}</span><span class="val">${dashboardStats['주간'].cat[cat]}</span></div>`;
      }
      
      html += `<div class="report-row" style="margin-top:15px; border-bottom:1px dashed #444; padding-bottom:5px;"><span style="color:var(--cyan)">[ 30 DAYS TOTAL ]</span><span class="val" style="color:var(--cyan)">${dashboardStats['월간'].total} Pts</span></div>`;
      for(let cat in dashboardStats['월간'].cat) {
        if(dashboardStats['월간'].cat[cat] > 0) html += `<div class="report-row"><span>- ${cat}</span><span class="val">${dashboardStats['월간'].cat[cat]}</span></div>`;
      }
      content.innerHTML = html;
    }

    // AI API 키 입력 및 호출 로직 강화
    async function requestAIAnalysis() {
      let apiKey = localStorage.getItem('hexagon_gemini_api_key');
      const aiOutput = document.getElementById('ai-output');
      
      // 키가 없으면 즉시 입력 팝업(prompt) 띄우기
      if(!apiKey || apiKey.trim() === '') {
        apiKey = prompt("[시스템 알림]\nGemini API 키가 기기에 등록되어 있지 않습니다.\n발급받으신 API 키를 아래에 붙여넣기 해주세요:");
        if(apiKey && apiKey.trim() !== '') {
          localStorage.setItem('hexagon_gemini_api_key', apiKey.trim());
        } else {
          aiOutput.innerHTML = "<span style='color:red'>[ERR] API 키 입력이 취소되었습니다. 시스템 연결 실패.</span>";
          return;
        }
      }
      
      aiOutput.innerHTML = "> TRANSMITTING DATA TO AI_CORE...<span class='blink'>_</span>";
      
      const statsText = JSON.stringify(dashboardStats);
      const promptText = `당신은 사용자의 훈련 스탯을 분석하는 냉철하고 전문적인 사이버펑크 AI 전술 코치입니다.
현재 사용자의 주간/월간 훈련(근력, 체력, 지력, 매력, 활력, 법력) 달성 데이터는 다음과 같습니다: ${statsText}
이 데이터를 바탕으로 현재 훈련의 밸런스와 불균형을 즉각적으로 분석하고, 다음 주에 집중해야 할 'X력' 훈련에 대해 3~4문장으로 핵심만 짧고 차가운 어조로 명령하듯 피드백을 제공해 주세요. 불필요한 인사는 생략합니다.`;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
        });
        
        if(!response.ok) {
          throw new Error('API 키가 유효하지 않거나 한도를 초과했습니다.');
        }

        const resData = await response.json();
        const text = resData.candidates[0].content.parts[0].text.replace(/\*/g, ''); 
        typeWriterEffect("> " + text, aiOutput);
      } catch(e) {
        // 오류 발생 시 키 초기화 옵션 제공
        localStorage.removeItem('hexagon_gemini_api_key');
        aiOutput.innerHTML = `<span style='color:red'>[ERR] 연결 실패: ${e.message}<br>API 키가 초기화되었습니다. 버튼을 다시 눌러 정확한 키를 입력하세요.</span>`;
      }
    }

    function typeWriterEffect(text, element) {
      element.innerHTML = "";
      let i = 0;
      function type() {
        if (i < text.length) {
          element.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
          i++;
          setTimeout(type, 25); 
        } else {
          element.innerHTML += "<span class='blink'>_</span>";
        }
      }
      type();
    }

    // 차트 시인성(Visibility) 대폭 개선
    function drawHexagonChart(stats, targets) {
      const canvas = document.getElementById('radarChart');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const cx = canvas.width / 2;
      const cy = canvas.height / 2 + 10;
      const R = 90; 

      const categories = ['근력', '체력', '매력', '활력', '법력', '지력'];
      const angles = [-Math.PI/2, -Math.PI/6, Math.PI/6, Math.PI/2, 5*Math.PI/6, 7*Math.PI/6];

      // 1. 거미줄 라인 밝기 향상 (투명도 0.4 -> 0.7)
      ctx.strokeStyle = 'rgba(176, 38, 255, 0.7)';
      ctx.lineWidth = 1;
      for (let level = 0.2; level <= 1.0; level += 0.2) {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          let x = cx + R * level * Math.cos(angles[i]);
          let y = cy + R * level * Math.sin(angles[i]);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      }

      // 2. 축 및 텍스트 밝기 향상
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let i = 0; i < 6; i++) {
        let x = cx + R * Math.cos(angles[i]);
        let y = cy + R * Math.sin(angles[i]);
        ctx.strokeStyle = 'rgba(176, 38, 255, 0.5)';
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(x, y); ctx.stroke();

        let labelX = cx + (R + 30) * Math.cos(angles[i]);
        let labelY = cy + (R + 25) * Math.sin(angles[i]);
        
        ctx.font = 'bold 13px "Malgun Gothic", sans-serif'; // 한글 폰트 적용
        ctx.fillStyle = '#ddd'; // 밝은 회색으로 변경
        ctx.fillText(categories[i], labelX, labelY - 8);
        
        ctx.font = '11px "Share Tech Mono"';
        ctx.fillStyle = 'var(--cyan)';
        let statVal = stats[categories[i]] || 0;
        let targetVal = targets[categories[i]] || 1;
        ctx.fillText(`${statVal}/${targetVal}`, labelX, labelY + 8);
      }

      // 3. 누적 도형 (일렉트릭 블루 렌더링 - 투명도 0.4로 진하게 변경, 선 두께 2.5로 상향)
      ctx.beginPath();
      let points = [];
      for (let i = 0; i < 6; i++) {
        let cat = categories[i];
        let ratio = (stats[cat] || 0) / (targets[cat] || 1);
        let drawRatio = ratio; 
        
        let px = cx + R * drawRatio * Math.cos(angles[i]);
        let py = cy + R * drawRatio * Math.sin(angles[i]);
        points.push({x: px, y: py, ratio: ratio});
        
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      
      ctx.fillStyle = 'rgba(0, 229, 255, 0.4)'; // 더 진하게 채우기
      ctx.fill();
      ctx.strokeStyle = 'var(--cyan)';
      ctx.lineWidth = 2.5; // 외곽선 두껍게
      ctx.shadowColor = 'var(--cyan)';
      ctx.shadowBlur = 15;
      ctx.stroke();
      ctx.shadowBlur = 0; 

      // 초과 달성 시 골드 발광 포인트
      for (let i = 0; i < 6; i++) {
        let p = points[i];
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        
        if (p.ratio >= 1.0) {
          ctx.fillStyle = 'var(--gold)';
          ctx.shadowColor = 'var(--gold)';
          ctx.shadowBlur = 20;
          ctx.fill();
        } else {
          ctx.fillStyle = 'var(--cyan)';
          ctx.shadowBlur = 0;
          ctx.fill();
        }
        ctx.shadowBlur = 0; 
      }
    }
  </script>
</body>
</html>
