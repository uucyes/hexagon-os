<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HEXAGON.OS - CHM Training V2</title>
    <style>
        :root {
            --bg-color: #050505;
            --neon-mint: #00ffcc;
            --neon-magenta: #ff00ff;
            --text-main: #ffffff;
            --text-dim: #888888;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }
        header {
            padding: 20px; text-align: center; border-bottom: 1px solid var(--neon-mint);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
            position: relative;
        }
        h1 { margin: 0; font-size: 1.2rem; color: var(--neon-mint); text-shadow: 0 0 5px var(--neon-mint); letter-spacing: 2px; }
        .exit-btn { position: absolute; right: 20px; top: 20px; color: var(--text-dim); cursor: pointer; font-size: 0.9rem; }
        
        .phase-indicator {
            display: flex; justify-content: space-around; padding: 12px 0; background: #111;
            font-size: 0.85rem; color: var(--text-dim); border-bottom: 1px solid #333;
        }
        .phase-indicator span.active { color: var(--neon-mint); font-weight: bold; text-shadow: 0 0 5px var(--neon-mint); }
        
        #content-area {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; text-align: center; overflow-y: auto;
        }
        
        .card {
            background: #1a1a1a; border: 1px solid var(--neon-mint); border-radius: 10px;
            padding: 30px; width: 100%; max-width: 400px; box-sizing: border-box; box-shadow: 0 0 15px rgba(0,255,204,0.1);
        }
        
        .question { font-size: 1.5rem; margin-bottom: 20px; font-weight: bold; word-break: keep-all; line-height: 1.4; }
        .answer { font-size: 1.2rem; color: var(--neon-mint); display: none; margin-bottom: 20px; word-break: keep-all; line-height: 1.4; }
        .accuracy { font-size: 0.95rem; color: var(--neon-magenta); margin-top: 15px; display: none; padding: 10px; background: #000; border: 1px dashed var(--neon-magenta); border-radius: 5px; }
        
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 30px; }
        
        button {
            background: transparent; color: var(--neon-mint); border: 1px solid var(--neon-mint);
            padding: 15px; border-radius: 5px; font-family: inherit; font-size: 1rem; font-weight: bold;
            text-transform: uppercase; cursor: pointer; transition: all 0.3s; flex: 1 1 45%;
        }
        button:active { background: var(--neon-mint); color: var(--bg-color); }
        button.mic-btn { border-color: #ffaa00; color: #ffaa00; }
        button.mic-btn:active, button.mic-btn.recording { background: #ffaa00; color: #000; box-shadow: 0 0 15px #ffaa00; }
        button.full-width { flex: 1 1 100%; }
        
        /* 1단계 양자택일 버튼 스타일 */
        button.fail-btn { border-color: var(--neon-magenta); color: var(--neon-magenta); }
        button.fail-btn:active { background: var(--neon-magenta); color: var(--bg-color); }
        button.pass-btn { border-color: var(--neon-mint); color: var(--neon-mint); }
        button.pass-btn:active { background: var(--neon-mint); color: var(--bg-color); }

        #loading { color: var(--neon-mint); font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header>
        <h1>[ CHM ] AUDIO MODULE</h1>
        <div class="exit-btn" onclick="window.location.href='index.html'">[ EXIT ]</div>
    </header>
    
    <div class="phase-indicator">
        <span id="nav-p1" class="active">P1: VOCA</span>
        <span id="nav-p2">P2: SHADOWING</span>
        <span id="nav-p3">P3: TRANSLATE</span>
    </div>

    <div id="content-area">
        <div id="loading">SYSTEM CONNECTING...</div>
        
        <div id="training-card" class="card" style="display: none;">
            <div id="context-label" style="font-size:0.85rem; color:var(--text-dim); margin-bottom:15px; letter-spacing: 1px;"></div>
            <div id="question-text" class="question"></div>
            <div id="answer-text" class="answer"></div>
            <div id="accuracy-text" class="accuracy"></div>
            
            <div class="controls">
                <button id="btn-listen" style="display:none;" onclick="playTTS()">[ 듣기 ]</button>
                <button id="btn-speak" class="mic-btn" style="display:none;" onclick="startSTT()">[ 말하기 ]</button>
                <button id="btn-action" class="full-width" onclick="handleAction()">[ 정답 확인 ]</button>
                
                <button id="btn-fail" class="fail-btn" style="display:none;" onclick="handleVocaResult(false)">[ 몰랐음 (오답) ]</button>
                <button id="btn-pass" class="pass-btn" style="display:none;" onclick="handleVocaResult(true)">[ 알았음 (통과) ]</button>

                <button id="btn-next" class="full-width" style="display:none;" onclick="nextItem()">[ 다음으로 ]</button>
            </div>
        </div>
    </div>

    <script>
        // 통신 URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyuMPRaNEUCrr3FLjPDuQBgdOM1GTsPD8KG9g1-AN01NPv9k75VqIGSEXggUvavniyh/exec";
        
        let db = { vocabulary: [], sentences: [] };
        let currentPhase = 1; 
        let currentIndex = 0;
        let isAnswerRevealed = false;

        // 브라우저 음성 엔진 초기화
        const synth = window.speechSynthesis;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;

        if(recognition) {
            recognition.continuous = false;
            recognition.interimResults = false;
        }

        async function loadData() {
            try {
                const response = await fetch(GAS_URL + "?action=getCharmData");
                const result = await response.json();
                if(result.success) {
                    db.vocabulary = result.vocabulary;
                    db.sentences = result.sentences;
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('training-card').style.display = 'block';
                    renderItem();
                } else {
                    document.getElementById('loading').innerText = "DATA LOAD FAILED: " + result.error;
                }
            } catch (e) {
                document.getElementById('loading').innerText = "NETWORK ERROR";
            }
        }

        function renderItem() {
            isAnswerRevealed = false;
            document.getElementById('answer-text').style.display = 'none';
            document.getElementById('accuracy-text').style.display = 'none';
            
            const qText = document.getElementById('question-text');
            const aText = document.getElementById('answer-text');
            const ctxLabel = document.getElementById('context-label');
            
            const btnListen = document.getElementById('btn-listen');
            const btnSpeak = document.getElementById('btn-speak');
            const btnAction = document.getElementById('btn-action');
            const btnNext = document.getElementById('btn-next');
            const btnFail = document.getElementById('btn-fail');
            const btnPass = document.getElementById('btn-pass');

            // 버튼 초기화
            btnAction.style.display = 'block';
            btnNext.style.display = 'none';
            btnFail.style.display = 'none';
            btnPass.style.display = 'none';

            document.querySelectorAll('.phase-indicator span').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-p${currentPhase}`).classList.add('active');

            if (currentPhase === 1) { 
                if(currentIndex >= db.vocabulary.length) { advancePhase(); return; }
                const item = db.vocabulary[currentIndex];
                ctxLabel.innerText = `[ VOCA : ${currentIndex + 1} / ${db.vocabulary.length} ]`;
                qText.innerText = item.eng;
                aText.innerText = item.kor;
                btnListen.style.display = 'block';
                btnSpeak.style.display = 'none';
            } 
            else if (currentPhase === 2) { 
                if(currentIndex >= db.sentences.length) { advancePhase(); return; }
                const item = db.sentences[currentIndex];
                ctxLabel.innerText = `[ SHADOWING : ${item.context} ]`;
                qText.innerText = item.eng; 
                aText.innerText = item.kor;
                btnListen.style.display = 'block';
                btnSpeak.style.display = 'block';
            }
            else if (currentPhase === 3) { 
                if(currentIndex >= db.sentences.length) { completeTraining(); return; }
                const item = db.sentences[currentIndex];
                ctxLabel.innerText = `[ TRANSLATE : ${item.context} ]`;
                qText.innerText = item.kor; 
                aText.innerText = item.eng;
                btnListen.style.display = 'none'; 
                btnSpeak.style.display = 'block';
            }
        }

        function handleAction() {
            document.getElementById('answer-text').style.display = 'block';
            document.getElementById('btn-action').style.display = 'none';
            isAnswerRevealed = true;
            
            if (currentPhase === 1) {
                // 1단계: 양자택일 버튼 활성화
                document.getElementById('btn-fail').style.display = 'block';
                document.getElementById('btn-pass').style.display = 'block';
            } else {
                // 2, 3단계: 다음으로 버튼 활성화
                document.getElementById('btn-next').style.display = 'block';
                if(currentPhase === 3) document.getElementById('btn-listen').style.display = 'block';
            }
        }

        // 1단계 전용 결과 처리 로직
        function handleVocaResult(isKnown) {
            if (!isKnown) {
                const item = db.vocabulary[currentIndex];
                logErrorToGAS(item.eng, "단어 뜻 암기 실패 (셀프 체크)", 0);
            }
            nextItem();
        }

        function nextItem() {
            currentIndex++;
            renderItem();
        }

        function advancePhase() {
            currentPhase++;
            currentIndex = 0;
            if(currentPhase > 3) { completeTraining(); return; }
            renderItem();
        }

        function playTTS() {
            if(synth.speaking) synth.cancel();
            let textToSpeak = currentPhase === 1 ? db.vocabulary[currentIndex].eng : db.sentences[currentIndex].eng;
            let utterThis = new SpeechSynthesisUtterance(textToSpeak);
            utterThis.lang = 'en-US';
            utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function startSTT() {
            if(!recognition) {
                alert("이 브라우저는 음성 인식을 지원하지 않습니다.");
                return;
            }
            
            const targetText = db.sentences[currentIndex].eng;
            const btnSpeak = document.getElementById('btn-speak');
            
            recognition.lang = 'en-US';
            recognition.start();
            
            recognition.onstart = function() {
                btnSpeak.classList.add('recording');
                btnSpeak.innerText = "[ 듣고 있습니다... ]";
            };
            
            recognition.onresult = function(event) {
                const spokenText = event.results[0][0].transcript;
                const accuracy = calculateAccuracy(spokenText, targetText);
                
                const accText = document.getElementById('accuracy-text');
                accText.style.display = 'block';
                accText.innerHTML = `인식: <span style="color:#fff;">"${spokenText}"</span><br>정확도: ${accuracy}%`;
                
                if(accuracy < 80) {
                    accText.style.borderColor = "var(--neon-magenta)";
                    accText.style.color = "var(--neon-magenta)";
                    logErrorToGAS(targetText, spokenText, accuracy);
                } else {
                    accText.style.borderColor = "var(--neon-mint)";
                    accText.style.color = "var(--neon-mint)";
                }
                
                handleAction(); 
            };
            
            recognition.onspeechend = function() { recognition.stop(); };
            recognition.onend = function() {
                btnSpeak.classList.remove('recording');
                btnSpeak.innerText = "[ 다시 말하기 ]";
            };
        }

        function calculateAccuracy(spoken, target) {
            let sWords = spoken.toLowerCase().replace(/[^a-z0-9 ]/g, '').split(' ');
            let tWords = target.toLowerCase().replace(/[^a-z0-9 ]/g, '').split(' ');
            let matchCount = tWords.filter(w => sWords.includes(w)).length;
            return Math.round((matchCount / tWords.length) * 100);
        }

        function logErrorToGAS(question, answer, accuracy) {
            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'logCharmError',
                    payload: { phase: "Phase " + currentPhase, question: question, answer: answer, accuracy: accuracy }
                })
            });
        }

        function completeTraining() {
            alert("1~3단계 기본 훈련이 완료되었습니다.");
            window.location.href = 'index.html';
        }

        window.onload = loadData;
    </script>
</body>
</html>
