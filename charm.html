<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HEXAGON.OS - CHM Training FINAL</title>
    <style>
        :root {
            --bg-color: #050505;
            --neon-mint: #00ffcc;
            --neon-magenta: #ff00ff;
            --text-main: #ffffff;
            --text-dim: #888888;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }
        header {
            padding: 20px; text-align: center; border-bottom: 1px solid var(--neon-mint);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
            position: relative;
        }
        h1 { margin: 0; font-size: 1.2rem; color: var(--neon-mint); text-shadow: 0 0 5px var(--neon-mint); letter-spacing: 2px; }
        .exit-btn { position: absolute; right: 20px; top: 20px; color: var(--text-dim); cursor: pointer; font-size: 0.9rem; }
        
        .phase-indicator {
            display: flex; justify-content: space-around; padding: 12px 0; background: #111;
            font-size: 0.75rem; color: var(--text-dim); border-bottom: 1px solid #333;
        }
        .phase-indicator span.active { color: var(--neon-mint); font-weight: bold; text-shadow: 0 0 5px var(--neon-mint); }
        
        #content-area {
            flex: 1; display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
            padding: 20px; text-align: center; overflow-y: auto;
        }
        
        .card {
            background: #1a1a1a; border: 1px solid var(--neon-mint); border-radius: 10px;
            padding: 30px 20px; width: 100%; max-width: 400px; box-sizing: border-box; box-shadow: 0 0 15px rgba(0,255,204,0.1);
            margin-top: 20px;
        }
        
        .question { font-size: 1.5rem; margin-bottom: 20px; font-weight: bold; word-break: keep-all; line-height: 1.4; }
        .answer { font-size: 1.2rem; color: var(--neon-mint); display: none; margin-bottom: 20px; word-break: keep-all; line-height: 1.4; }
        .accuracy { font-size: 0.95rem; color: var(--neon-magenta); margin-top: 15px; display: none; padding: 10px; background: #000; border: 1px dashed var(--neon-magenta); border-radius: 5px; }
        
        .controls { display: flex; flex-direction: column; width: 100%; gap: 12px; margin-top: 30px; }
        
        button {
            width: 100%; box-sizing: border-box; background: transparent; color: var(--neon-mint);
            border: 1px solid var(--neon-mint); padding: 16px; border-radius: 8px; font-family: inherit;
            font-size: 1.05rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: all 0.2s;
        }
        button:active { background: var(--neon-mint); color: var(--bg-color); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        button.mic-btn { border-color: #ffaa00; color: #ffaa00; }
        button.mic-btn:active, button.mic-btn.recording { background: #ffaa00; color: #000; box-shadow: 0 0 15px #ffaa00; }
        
        .btn-row { display: flex; gap: 10px; width: 100%; }
        .btn-row button { flex: 1; padding: 16px 0; }
        
        button.fail-btn { border-color: var(--neon-magenta); color: var(--neon-magenta); }
        button.fail-btn:active { background: var(--neon-magenta); color: var(--bg-color); }
        button.pass-btn { border-color: var(--neon-mint); color: var(--neon-mint); }
        button.pass-btn:active { background: var(--neon-mint); color: var(--bg-color); }

        /* 채팅 UI 스타일 (Phase 5) */
        .chat-container { height: 350px; background: #000; border: 1px solid #333; border-radius: 6px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; text-align: left; }
        .bubble { max-width: 85%; padding: 12px; border-radius: 8px; font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
        .ai { align-self: flex-start; background: #1a1a1a; border-left: 3px solid var(--neon-mint); color: #fff; }
        .user { align-self: flex-end; background: #333; color: #ffaa00; }

        #loading { color: var(--neon-mint); font-weight: bold; letter-spacing: 1px; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>[CHM] AUDIO MODULE</h1>
        <div class="exit-btn" onclick="window.location.href='index.html'">[ EXIT ]</div>
    </header>
    
    <div class="phase-indicator">
        <span id="nav-p1" class="active">P1:VOCA</span>
        <span id="nav-p2">P2:SHADOW</span>
        <span id="nav-p3">P3:TRANS</span>
        <span id="nav-p4">P4:REVIEW</span>
        <span id="nav-p5">P5:AI TALK</span>
    </div>

    <div id="content-area">
        <div id="loading">SYSTEM CONNECTING...</div>
        
        <div id="training-card" class="card" style="display: none;">
            <div id="context-label" style="font-size:0.85rem; color:var(--text-dim); margin-bottom:15px; letter-spacing: 1px;"></div>
            <div id="question-text" class="question"></div>
            <div id="answer-text" class="answer"></div>
            <div id="accuracy-text" class="accuracy"></div>
            
            <div class="controls">
                <button id="btn-listen" style="display:none;" onclick="playTTS()">[ 원어민 듣기 ]</button>
                <button id="btn-speak" class="mic-btn" style="display:none;" onclick="startSTT()">[ 따라 말하기 ]</button>
                <button id="btn-action" style="display:none;" onclick="handleAction()">[ 정답 확인 ]</button>
                
                <div id="voca-eval-btns" class="btn-row" style="display:none;">
                    <button id="btn-fail" class="fail-btn" onclick="handleResult(false)">[ 몰랐음 ]</button>
                    <button id="btn-pass" class="pass-btn" onclick="handleResult(true)">[ 알았음 ]</button>
                </div>
                
                <button id="btn-next" style="display:none;" onclick="nextItem()">[ 다음으로 ]</button>
            </div>
        </div>

        <div id="ai-talk-card" class="card" style="display: none; padding: 20px;">
            <div style="color:var(--neon-mint); font-size:0.9rem; font-weight:bold; margin-bottom: 10px; letter-spacing: 1px;">[ PHASE 5 : REAL-LIFE ROLEPLAY ]</div>
            <div class="chat-container" id="chatHistory"></div>
            
            <div class="controls" style="margin-top: 10px;">
                <button id="btn-mic-chat" class="mic-btn full-width" onclick="startChatSTT()">[ 음성으로 대답하기 ]</button>
                <button id="btn-finish" class="pass-btn full-width" onclick="saveFinalLog()">[ 훈련 최종 완료 및 기록 ]</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyuMPRaNEUCrr3FLjPDuQBgdOM1GTsPD8KG9g1-AN01NPv9k75VqIGSEXggUvavniyh/exec";
        const API_STORAGE_KEY = 'hexagon_gemini_api_key'; // 기존 발급받으신 Gemini API 키 연동
        
        let db = { vocabulary: [], sentences: [] };
        let reviewQueue = []; // 오답 저장소 (Phase 4용)
        let currentPhase = 1; 
        let currentIndex = 0;
        let chatContext = "";

        const synth = window.speechSynthesis;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;

        if(recognition) {
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
        }

        async function loadData() {
            try {
                const response = await fetch(GAS_URL + "?action=getCharmData");
                const result = await response.json();
                if(result.success) {
                    db.vocabulary = result.vocabulary;
                    db.sentences = result.sentences;
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('training-card').style.display = 'block';
                    renderItem();
                } else {
                    document.getElementById('loading').innerText = "DATA LOAD FAILED";
                }
            } catch (e) {
                document.getElementById('loading').innerText = "NETWORK ERROR";
            }
        }

        function renderItem() {
            document.getElementById('answer-text').style.display = 'none';
            document.getElementById('accuracy-text').style.display = 'none';
            document.getElementById('btn-listen').style.display = 'none';
            document.getElementById('btn-speak').style.display = 'none';
            document.getElementById('btn-action').style.display = 'none';
            document.getElementById('voca-eval-btns').style.display = 'none';
            document.getElementById('btn-next').style.display = 'none';

            const qText = document.getElementById('question-text');
            const aText = document.getElementById('answer-text');
            const ctxLabel = document.getElementById('context-label');

            document.querySelectorAll('.phase-indicator span').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-p${currentPhase}`).classList.add('active');

            let item;
            if (currentPhase === 1) { 
                if(currentIndex >= db.vocabulary.length) { advancePhase(); return; }
                item = db.vocabulary[currentIndex];
                ctxLabel.innerText = `[ VOCA : ${currentIndex + 1} / ${db.vocabulary.length} ]`;
                qText.innerText = item.eng; aText.innerText = item.kor;
                document.getElementById('btn-listen').style.display = 'block';
                document.getElementById('btn-action').style.display = 'block';
            } 
            else if (currentPhase === 2) { 
                if(currentIndex >= db.sentences.length) { advancePhase(); return; }
                item = db.sentences[currentIndex];
                ctxLabel.innerText = `[ SHADOWING : ${item.context} ]`;
                qText.innerText = item.eng; aText.innerText = item.kor;
                aText.style.display = 'block'; 
                document.getElementById('btn-listen').style.display = 'block';
                document.getElementById('btn-speak').style.display = 'block';
                document.getElementById('btn-speak').innerText = "[ 따라 말하기 ]";
            }
            else if (currentPhase === 3) { 
                if(currentIndex >= db.sentences.length) { advancePhase(); return; }
                item = db.sentences[currentIndex];
                ctxLabel.innerText = `[ TRANSLATE : ${item.context} ]`;
                qText.innerText = item.kor; aText.innerText = item.eng; 
                document.getElementById('btn-speak').style.display = 'block';
                document.getElementById('btn-speak').innerText = "[ 영어로 말하기 ]";
            }
            else if (currentPhase === 4) { 
                if(reviewQueue.length === 0 || currentIndex >= reviewQueue.length) { advancePhase(); return; }
                item = reviewQueue[currentIndex];
                ctxLabel.innerText = `[ SMART REVIEW : 오답 복습 ${currentIndex + 1} / ${reviewQueue.length} ]`;
                ctxLabel.style.color = "var(--neon-magenta)";
                
                if(item.type === 'voca') {
                    qText.innerText = item.data.eng; aText.innerText = item.data.kor;
                    document.getElementById('btn-listen').style.display = 'block';
                    document.getElementById('btn-action').style.display = 'block';
                } else {
                    qText.innerText = item.data.eng; aText.innerText = item.data.kor;
                    aText.style.display = 'block';
                    document.getElementById('btn-listen').style.display = 'block';
                    document.getElementById('btn-speak').style.display = 'block';
                    document.getElementById('btn-speak').innerText = "[ 다시 말해보기 ]";
                }
            }
        }

        function handleAction() {
            document.getElementById('answer-text').style.display = 'block';
            if (currentPhase === 1 || (currentPhase === 4 && reviewQueue[currentIndex].type === 'voca')) {
                document.getElementById('btn-action').style.display = 'none';
                document.getElementById('voca-eval-btns').style.display = 'flex';
            } else if (currentPhase === 3) {
                document.getElementById('btn-speak').style.display = 'none';
                document.getElementById('btn-listen').style.display = 'block';
                document.getElementById('btn-listen').innerText = "[ 정답 듣기 ]";
                document.getElementById('btn-next').style.display = 'block';
            }
        }

        function handleResult(isKnown) {
            let currentItem = (currentPhase === 4) ? reviewQueue[currentIndex].data : db.vocabulary[currentIndex];
            if (!isKnown && currentPhase === 1) {
                reviewQueue.push({ type: 'voca', data: currentItem });
                logErrorToGAS(currentItem.eng, "단어 암기 실패", 0);
            }
            nextItem();
        }

        function nextItem() {
            currentIndex++;
            renderItem();
        }

        function advancePhase() {
            currentPhase++;
            currentIndex = 0;
            if(currentPhase === 4 && reviewQueue.length === 0) currentPhase++; // 오답 없으면 5단계로 패스
            if(currentPhase === 5) { startPhase5(); return; }
            renderItem();
        }

        function playTTS(textOverride = null) {
            if(synth.speaking) synth.cancel();
            let textToSpeak = textOverride;
            if(!textToSpeak) {
                if(currentPhase === 4) textToSpeak = reviewQueue[currentIndex].data.eng;
                else textToSpeak = currentPhase === 1 ? db.vocabulary[currentIndex].eng : db.sentences[currentIndex].eng;
            }
            
            let utterThis = new SpeechSynthesisUtterance(textToSpeak);
            utterThis.lang = 'en-US';
            utterThis.rate = 0.95;
            
            // Phase 5에서 다중 페르소나 적용 (여성/남성/아이 목소리 랜덤 변조)
            if(textOverride) {
                const voices = synth.getVoices().filter(v => v.lang.includes('en'));
                if(voices.length > 0) utterThis.voice = voices[Math.floor(Math.random() * voices.length)];
                utterThis.pitch = Math.random() * 0.8 + 0.6; // 피치 변조로 다양한 페르소나 연출
            }
            
            synth.speak(utterThis);
        }

        function startSTT() {
            if(!recognition) return alert("브라우저 음성 인식 미지원");
            
            let targetText = (currentPhase === 4) ? reviewQueue[currentIndex].data.eng : db.sentences[currentIndex].eng;
            const btnSpeak = document.getElementById('btn-speak');
            
            recognition.start();
            recognition.onstart = function() {
                btnSpeak.classList.add('recording');
                btnSpeak.innerText = "[ 듣고 있습니다... ]";
            };
            
            recognition.onresult = function(event) {
                const spokenText = event.results[0][0].transcript;
                const accuracy = calculateAccuracy(spokenText, targetText);
                
                const accText = document.getElementById('accuracy-text');
                accText.style.display = 'block';
                accText.innerHTML = `인식: <span style="color:#fff;">"${spokenText}"</span><br>정확도: ${accuracy}%`;
                
                if(accuracy < 80) {
                    accText.style.borderColor = "var(--neon-magenta)";
                    accText.style.color = "var(--neon-magenta)";
                    if(currentPhase === 2 || currentPhase === 3) reviewQueue.push({ type: 'sent', data: db.sentences[currentIndex] });
                    logErrorToGAS(targetText, spokenText, accuracy);
                } else {
                    accText.style.borderColor = "var(--neon-mint)";
                    accText.style.color = "var(--neon-mint)";
                }
                
                if (currentPhase === 2 || currentPhase === 4) document.getElementById('btn-next').style.display = 'block';
                else if (currentPhase === 3) handleAction(); 
            };
            
            recognition.onspeechend = function() { recognition.stop(); };
            recognition.onend = function() {
                btnSpeak.classList.remove('recording');
                btnSpeak.innerText = "[ 다시 시도하기 ]";
            };
        }

        function calculateAccuracy(s, t) {
            let sWords = s.toLowerCase().replace(/[^a-z0-9 ]/g, '').split(' ');
            let tWords = t.toLowerCase().replace(/[^a-z0-9 ]/g, '').split(' ');
            let matchCount = tWords.filter(w => sWords.includes(w)).length;
            return Math.round((matchCount / tWords.length) * 100);
        }

        function logErrorToGAS(q, a, acc) {
            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'logCharmError', payload: { phase: "Phase " + currentPhase, question: q, answer: a, accuracy: acc } })
            });
        }

        // ==========================================
        // [ Phase 5 : 다중 페르소나 AI 실전 롤플레잉 ]
        // ==========================================
        
        function startPhase5() {
            document.getElementById('training-card').style.display = 'none';
            document.getElementById('ai-talk-card').style.display = 'block';
            document.querySelectorAll('.phase-indicator span').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-p5').classList.add('active');

            const savedKey = localStorage.getItem(API_STORAGE_KEY);
            if (!savedKey) {
                addChatBubble('ai', "API 키가 등록되지 않아 실전 대화를 건너뜁니다. 아래 [완료] 버튼을 눌러 실적을 기록하십시오.");
                return;
            }

            const targetSentence = db.sentences.length > 0 ? db.sentences[0].eng : "Hello!";
            addChatBubble('ai', "시스템 로딩 중... AI 파트너가 상황을 설정하고 있습니다.");

            const prompt = `당신은 원어민 회화 파트너입니다. 사용자가 오늘 배운 주요 문장은 "${targetSentence}" 입니다. 이 문장이 쓰일 법한 일상 상황(식당, 공항, 비즈니스 등)을 하나 자유롭게 설정하고, 그 상황에 맞춰 영어로 먼저 인사를 건네며 짧게 대화를 시작하세요. 절대 한국어를 쓰지 마세요.`;
            
            callGeminiAPI(prompt, response => {
                document.getElementById('chatHistory').innerHTML = ''; // 로딩 메시지 제거
                if(response) {
                    addChatBubble('ai', response);
                    playTTS(response);
                    chatContext += `System: ${prompt}\nAI: ${response}\n`;
                }
            });
        }

        function startChatSTT() {
            if(!recognition) return;
            const btnChat = document.getElementById('btn-mic-chat');
            
            recognition.start();
            recognition.onstart = function() {
                btnChat.classList.add('recording');
                btnChat.innerText = "[ 듣고 있습니다. 완료되면 자동으로 전송됩니다 ]";
            };
            
            recognition.onresult = function(event) {
                const userText = event.results[0][0].transcript;
                addChatBubble('user', userText);
                chatContext += `User: ${userText}\n`;
                
                btnChat.classList.remove('recording');
                btnChat.innerText = "[ AI 응답 대기 중... ]";
                btnChat.disabled = true;

                const prompt = `이전 대화 내역:\n${chatContext}\n사용자의 응답: "${userText}"\n\n지시사항:\n1. 위 흐름에 맞춰 원어민처럼 자연스럽게 대화를 영어로 이어가세요.\n2. 만약 사용자의 영어 문법이나 표현이 어색했다면 대답의 맨 마지막 줄에 '[교정: 올바른 표현]' 이라고 덧붙이세요.\n3. 그 외에는 절대 한국어를 쓰지 마세요.`;
                
                callGeminiAPI(prompt, response => {
                    btnChat.innerText = "[ 음성으로 대답하기 ]";
                    btnChat.disabled = false;
                    if(response) {
                        addChatBubble('ai', response);
                        playTTS(response.replace(/\[교정:.*?\]/g, '')); // 교정 텍스트는 빼고 음성 읽기
                        chatContext += `AI: ${response}\n`;
                    }
                });
            };
            
            recognition.onspeechend = function() { recognition.stop(); };
            recognition.onend = function() { if(!btnChat.disabled) { btnChat.classList.remove('recording'); btnChat.innerText = "[ 다시 대답하기 ]"; } };
        }

        function callGeminiAPI(promptText, callback) {
            const apiKey = localStorage.getItem(API_STORAGE_KEY);
            const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + apiKey;
            
            fetch(url, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ "contents": [{ "parts": [{"text": promptText}] }] })
            })
            .then(res => res.json())
            .then(data => {
                if (data.candidates) callback(data.candidates[0].content.parts[0].text);
                else callback(null);
            }).catch(() => callback(null));
        }

        function addChatBubble(role, text) {
            const chatBox = document.getElementById('chatHistory');
            let formattedText = text;
            
            if (role === 'ai') {
                const match = text.match(/\[교정:.*?\]/g);
                if(match) {
                    formattedText = text.replace(match[0], '').trim();
                    formattedText += `<br><span style="color:var(--neon-mint); font-size:0.8rem; display:block; margin-top:8px; border-top:1px dashed #555; padding-top:5px;">${match[0]}</span>`;
                }
            }
            chatBox.innerHTML += `<div class="bubble ${role}">${formattedText}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // ==========================================
        // [ 훈련 완료 및 대시보드 실적 기록 ]
        // ==========================================
        function saveFinalLog() {
            const btn = document.getElementById('btn-finish');
            btn.innerText = "[ 서버에 실적 기록 중... ]";
            btn.disabled = true;

            const payload = {
                category: '매력', 
                content: '영어 회화 V3.0 통합 훈련 완료', 
                value: 1, 
                feedback: '완료'
            };

            fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "logActivity", payload: payload })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    alert("축하합니다! 매력(CHM) 훈련이 완료되었으며 대시보드에 실적이 기록되었습니다.");
                    window.location.href = 'index.html';
                } else {
                    alert("기록 오류: " + data.error);
                    btn.innerText = "[ 훈련 최종 완료 및 기록 ]";
                    btn.disabled = false;
                }
            }).catch(() => {
                alert("네트워크 오류로 실적을 기록하지 못했습니다.");
                btn.innerText = "[ 훈련 최종 완료 및 기록 ]";
                btn.disabled = false;
            });
        }

        window.onload = loadData;
    </script>
</body>
</html>
