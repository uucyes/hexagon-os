<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HEXAGON.OS - VITALITY MODULE</title>
  <style>
    :root { --p: #00ffcc; --bg: #050505; --card: #141414; --danger: #ff4444; --magenta: #ff00ff; --gold: #ffd700; }
    body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
    .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    
    .status-box { text-align: center; margin-bottom: 20px; width: 100%; max-width: 400px; }
    .status-title { font-size: 12px; color: #888; letter-spacing: 2px; margin-bottom: 5px; }
    .status-value { font-size: 28px; font-weight: bold; color: var(--p); letter-spacing: 1px; text-shadow: 0 0 10px rgba(0,255,204,0.3); }
    .money-value { font-size: 16px; color: #aaa; margin-top: 5px; margin-bottom: 15px; }
    .money-value span { color: var(--p); font-weight: bold; }

    /* 재정적 보상(전리품) UI */
    .reward-box { background: rgba(255, 215, 0, 0.05); border: 1px solid rgba(255, 215, 0, 0.3); padding: 15px; border-radius: 6px; margin-bottom: 20px; }
    .reward-title { font-size: 11px; color: var(--gold); font-weight: bold; letter-spacing: 1px; margin-bottom: 5px; text-transform: uppercase; }
    .reward-item { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 5px; word-break: keep-all; }
    .reward-next { font-size: 12px; color: #888; }
    .reward-next span { color: var(--gold); }

    /* 누적형 타임라인 컨테이너 */
    .timeline-container { width: 100%; max-width: 400px; max-height: 380px; overflow-y: auto; padding-right: 5px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 12px; }
    
    .tl-item { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 6px; box-sizing: border-box; transition: all 0.3s; }
    .tl-header { font-size: 14px; font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .tl-desc { font-size: 13px; line-height: 1.5; word-break: keep-all; }

    /* 상태별 스타일 */
    .tl-item.completed { border-left: 3px solid #008866; cursor: pointer; }
    .tl-item.completed:hover { background: #1a1a1a; }
    .tl-item.completed .tl-header { color: #008866; }
    .tl-item.completed .tl-desc { color: #aaa; background: #111; padding: 10px; border-radius: 4px; margin-top: 10px; border-left: 2px solid #008866; }
    .click-hint { font-size: 10px; color: #666; font-weight: normal; margin-left: 5px; }

    .tl-item.current { border: 1px solid var(--p); border-left: 4px solid var(--p); box-shadow: 0 0 15px rgba(0, 255, 204, 0.15); background: rgba(0, 255, 204, 0.03); }
    .tl-item.current .tl-header { color: var(--p); text-shadow: 0 0 5px rgba(0,255,204,0.5); }
    .tl-item.current .tl-desc { color: var(--magenta); background: rgba(255,0,255,0.08); padding: 10px; border-radius: 4px; border-left: 2px solid var(--magenta); margin-bottom: 10px; font-weight: bold; }

    .tl-item.locked { border-left: 3px solid #333; background: #0a0a0a; opacity: 0.5; }
    .tl-item.locked .tl-header { color: #555; }
    .tl-item.locked .tl-desc { display: none; }

    /* 경험치 바 */
    .progress-container { width: 100%; background: #222; border-radius: 10px; height: 10px; margin-bottom: 6px; overflow: hidden; position: relative; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--p), #00b38f); width: 0%; box-shadow: 0 0 10px var(--p); }
    .next-target { text-align: right; font-size: 11px; color: #888; }
    .next-target span { color: var(--p); font-weight: bold; }

    .timeline-container::-webkit-scrollbar { width: 4px; }
    .timeline-container::-webkit-scrollbar-track { background: #111; border-radius: 4px; }
    .timeline-container::-webkit-scrollbar-thumb { background: var(--p); border-radius: 4px; }

    .btn-solve { background: transparent; color: var(--p); border: 1px solid var(--p); padding: 14px; width: 100%; max-width: 400px; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; letter-spacing: 1px; margin-bottom: 10px; }
    .btn-solve:active { background: rgba(0, 255, 204, 0.1); }
    
    .btn-fail { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 14px; width: 100%; max-width: 400px; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; letter-spacing: 1px; }
    .btn-fail:active { background: rgba(255, 68, 68, 0.1); }

    .lock-screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; max-width: 400px; padding: 40px 20px; border: 1px dashed var(--p); border-radius: 8px; text-align: center; box-sizing: border-box; }
    .lock-title { font-size: 18px; font-weight: bold; color: var(--p); margin-bottom: 10px; }
    .lock-msg { font-size: 14px; color: #aaa; line-height: 1.5; margin-bottom: 20px; }

    #loading { color: var(--p); padding:50px; font-weight:bold; text-align:center; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="header">
    <b style="letter-spacing:2px; color:var(--p);">VITALITY.OS</b>
    <span onclick="goHome()" style="color:#888; cursor:pointer;">[ EXIT ]</span>
  </div>
  
  <div id="loading">CONNECTING BIO-DATA...</div>

  <div id="lockScreen" class="lock-screen">
    <div class="lock-title">[ 금일 시스템 점검 완료 ]</div>
    <div class="lock-msg">오늘의 금연 실적이 유지되어 하드웨어 복구가 진행 중입니다.<br>강력한 퍼포먼스를 위해 계속 유지하십시오.</div>
    <button style="background:var(--p); color:#000; padding:10px 20px; border:none; border-radius:6px; font-weight:bold; cursor:pointer;" onclick="goHome()">메인으로 복귀</button>
  </div>

  <div id="main" style="display:none; width:100%; max-width:400px; flex-direction:column; align-items:center;">
    
    <div class="status-box">
      <div class="status-title">NO SMOKING RECORD</div>
      <div class="status-value" id="daysCount">0일 차 달성</div>
      <div class="money-value">누적 절약 자금: <span id="moneySaved">0</span> 원</div>
      
      <div class="reward-box">
        <div class="reward-title">현재 획득 가능한 전리품</div>
        <div class="reward-item" id="rewardItem">계산 중...</div>
        <div class="reward-next" id="rewardNext">다음 목표 계산 중...</div>
      </div>
    </div>
    
    <div class="timeline-container" id="timelineContainer">
      </div>

    <button class="btn-solve" id="btnSuccess" onclick="confirmSuccess()">[ 오늘도 완벽하게 참아냄 ]</button>
    <button class="btn-fail" id="btnReset" onclick="confirmReset()">[ 시스템 경고: 흡연함 (초기화) ]</button>
    
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyuMPRaNEUCrr3FLjPDuQBgdOM1GTsPD8KG9g1-AN01NPv9k75VqIGSEXggUvavniyh/exec";
    const CIGARETTE_PRICE = 4500; 

    // 금액별 명품/전리품 리스트
    const rewardTiers = [
      { price: 0, name: "건강한 폐 한 모금" },
      { price: 5000, name: "스타벅스 프리미엄 커피" },
      { price: 30000, name: "프리미엄 배달 식사" },
      { price: 100000, name: "고급 니치 향수" },
      { price: 300000, name: "5성급 호텔 오마카세 2인권" },
      { price: 500000, name: "최신형 노이즈캔슬링 이어폰" },
      { price: 1000000, name: "보테가베네타 명품 지갑" },
      { price: 3000000, name: "최고급 맞춤형 테일러 정장" },
      { price: 5000000, name: "오메가 / 태그호이어 명품 시계" },
      { price: 10000000, name: "유럽 비즈니스석 왕복 항공권" },
      { price: 50000000, name: "고급 수입 스포츠카 계약금" }
    ];

    // 도발적이고 유머러스한 하드웨어 은유 타임라인
    const timeline = [
      { days: 1, title: "하부 배관 스케일링 착수", desc: "굳게 닫혀있던 수문이 미세하게 열리며 혈류 엔진에 시동이 걸립니다." },
      { days: 3, title: "말초신경 센서 영점 조절", desc: "스치기만 해도 반응하던 20대 시절의 예민한 센서가 다시 깨어납니다." },
      { days: 14, title: "하반신 8차선 고속도로 개통", desc: "하체 직통 혈류망 뚫림. 아침을 맞이하는 텐트의 장력이 눈에 띄게 팽팽해집니다." },
      { days: 30, title: "메인 엔진 터보차저 가동", desc: "거친 숨소리 없이 밤새도록 피스톤 운동을 지속할 수 있는 무한 동력이 확보됩니다." },
      { days: 100, title: "유압 시스템 100% 복구", desc: "어떠한 악조건 속에서도 강철 같은 텐션을 유지하는 '명검'으로 제련되었습니다." },
      { days: 365, title: "전설의 하드웨어 스펙 달성", desc: "파트너의 다리가 풀리게 만드는 압도적인 퍼포먼스와 무자비한 회복력을 장착했습니다." },
      { days: 1825, title: "신체의 모든 봉인 해제", desc: "더 이상의 설명은 생략합니다. 당신은 이제 완벽한 밤의 지배자입니다." }
    ];

    window.onload = function() {
      fetch(API_URL + "?action=getData")
        .then(response => response.json())
        .then(d => {
          if (d.locks && d.locks.vitality) {
            document.getElementById('lockScreen').style.display = 'flex';
            document.getElementById('loading').style.display = 'none';
            return; 
          }

          if (!d.vitalityStartDate) {
            showCustomModal("설정 오류", "구글 시트 '기준정보' 탭에 '금연시작일'이 설정되어 있지 않습니다.", false, goHome);
            return;
          }

          renderVitalityData(d.vitalityStartDate);
          
          document.getElementById('loading').style.display = 'none';
          document.getElementById('main').style.display = 'flex';
          
          setTimeout(() => {
            const currentEl = document.querySelector('.tl-item.current');
            if(currentEl) currentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 300);
        })
        .catch(err => {
          document.getElementById('loading').innerText = "통신 오류가 발생했습니다."; 
        });
    };

    function renderVitalityData(startDateStr) {
      const startDate = new Date(startDateStr);
      const today = new Date();
      startDate.setHours(0,0,0,0);
      today.setHours(0,0,0,0);
      
      const diffTime = Math.abs(today - startDate);
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      
      const savedMoney = diffDays * CIGARETTE_PRICE;

      document.getElementById('daysCount').innerText = `${diffDays}일 차 달성`;
      document.getElementById('moneySaved').innerText = savedMoney.toLocaleString();

      // 전리품(명품) 계산 로직
      let currentReward = rewardTiers[0];
      let nextReward = null;
      
      for (let i = 0; i < rewardTiers.length; i++) {
        if (savedMoney >= rewardTiers[i].price) {
          currentReward = rewardTiers[i];
        } else {
          nextReward = rewardTiers[i];
          break;
        }
      }

      document.getElementById('rewardItem').innerText = currentReward.name;
      if (nextReward) {
        const amountLeft = nextReward.price - savedMoney;
        document.getElementById('rewardNext').innerHTML = `다음 목표: <span>${nextReward.name}</span>까지 ${amountLeft.toLocaleString()}원 남음`;
      } else {
        document.getElementById('rewardNext').innerText = "모든 보상 티어를 달성하셨습니다.";
      }

      // 생체 타임라인 렌더링 로직
      let currentStageIndex = 0;
      for (let i = 0; i < timeline.length; i++) {
        if (diffDays >= timeline[i].days) currentStageIndex = i;
        else break;
      }

      const container = document.getElementById('timelineContainer');
      let htmlContent = '';

      for (let i = 0; i < timeline.length; i++) {
        const stage = timeline[i];

        if (i < currentStageIndex) {
          // 달성 완료 레벨 (클릭 시 아코디언 오픈)
          htmlContent += `
            <div class="tl-item completed" onclick="toggleDesc('desc-${i}')">
              <div class="tl-header">
                <span>[ V ] LEVEL ${i+1} : ${stage.title} <span class="click-hint">(터치하여 확인)</span></span>
                <span>D+${stage.days}</span>
              </div>
              <div class="tl-desc" id="desc-${i}" style="display:none;">"${stage.desc}"</div>
            </div>
          `;
        } else if (i === currentStageIndex) {
          // 현재 머물고 있는 레벨
          const nextStage = timeline[i+1];
          let progressHtml = '';
          
          if (nextStage) {
            const daysInStage = nextStage.days - stage.days;
            const daysPassedInStage = diffDays - stage.days;
            const progressPercent = Math.min(100, Math.max(0, (daysPassedInStage / daysInStage) * 100));
            const daysLeft = nextStage.days - diffDays;
            
            progressHtml = `
              <div class="progress-container">
                <div class="progress-bar" style="width:${progressPercent}%"></div>
              </div>
              <div class="next-target">다음 진화까지 <span>D-${daysLeft}</span></div>
            `;
          } else {
            progressHtml = `<div class="next-target"><span>최종 하드웨어 진화 완료</span></div>`;
          }

          htmlContent += `
            <div class="tl-item current">
              <div class="tl-header"><span>[ ! ] LEVEL ${i+1} : ${stage.title}</span></div>
              <div class="tl-desc">"${stage.desc}"</div>
              ${progressHtml}
            </div>
          `;
        } else {
          // 미달성 잠금 레벨
          htmlContent += `
            <div class="tl-item locked">
              <div class="tl-header"><span>[ L ] LEVEL ${i+1} : 봉인 해제 대기 중</span><span>목표 D+${stage.days}</span></div>
            </div>
          `;
        }
      }

      container.innerHTML = htmlContent;
    }

    // 아코디언(숨김 내용 펼치기) 함수
    function toggleDesc(id) {
      const descElement = document.getElementById(id);
      if (descElement.style.display === "none") {
        descElement.style.display = "block";
      } else {
        descElement.style.display = "none";
      }
    }

    function confirmSuccess() {
      showCustomModal("생체 엔진 유지", "오늘도 흡연의 유혹을 완벽하게 이겨내셨습니까?<br>실적을 기록하고 시스템을 업데이트합니다.", true, () => {
        logVitality('성공');
      });
    }

    function confirmReset() {
      showCustomModal("시스템 치명적 오류", "<span style='color:var(--danger);'>경고: 흡연을 하셨습니까?</span><br>지금까지 구축된 하드웨어 퍼포먼스와 금연 일수가 모두 초기화됩니다. 정말 초기화 하시겠습니까?", true, () => {
        resetVitality();
      });
    }

    function logVitality(status) {
      document.body.style.cursor = 'wait';
      const btn = document.getElementById('btnSuccess');
      btn.innerText = "데이터 전송 중...";
      btn.disabled = true;

      const payload = {
        category: '활력', 
        content: `금연 유지 훈련`, 
        value: 1, 
        feedback: status
      };

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "logActivity", payload: payload })
      })
      .then(response => response.json())
      .then(data => {
        document.body.style.cursor = 'default';
        if(data.success) {
          showCustomModal("기록 완료", "하드웨어 복구가 순조롭게 진행 중입니다.<br>내일도 완벽한 퍼포먼스를 유지하십시오.", false, goHome);
        } else {
          showCustomModal("오류", "실적 기록 실패: " + data.error, false);
          btn.innerText = "[ 오늘도 완벽하게 참아냄 ]";
          btn.disabled = false;
        }
      }).catch(err => {
        document.body.style.cursor = 'default';
        showCustomModal("오류", "통신 문제로 기록을 저장하지 못했습니다.", false);
        btn.innerText = "[ 오늘도 완벽하게 참아냄 ]";
        btn.disabled = false;
      });
    }

    function resetVitality() {
      document.body.style.cursor = 'wait';
      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "resetVitalityData" })
      })
      .then(response => response.json())
      .then(data => {
        document.body.style.cursor = 'default';
        if(data.success) {
          logVitality('실패'); 
          showCustomModal("초기화 완료", "모든 파이프라인이 리셋되었습니다. 오늘부터 다시 시스템을 재가동합니다.", false, goHome);
        } else {
          showCustomModal("오류", "초기화 실패: " + data.error, false);
        }
      }).catch(err => {
        document.body.style.cursor = 'default';
        showCustomModal("오류", "통신 오류가 발생했습니다.", false);
      });
    }

    function goHome() {
      window.location.href = 'index.html';
    }

    function showCustomModal(title, msg, isConfirm, onConfirm) {
      const overlay = document.createElement('div');
      overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:9999;display:flex;justify-content:center;align-items:center;";
      const box = document.createElement('div');
      box.style.cssText = "background:#141414;border:1px solid #333;border-top:4px solid var(--p);padding:25px;border-radius:8px;width:80%;max-width:320px;text-align:center;box-shadow:0 0 20px rgba(0,0,0,0.5);";
      
      box.innerHTML = `
        <div style="font-size:18px;font-weight:bold;color:var(--p);margin-bottom:15px;letter-spacing:1px;">${title}</div>
        <div style="font-size:14px;color:#ccc;margin-bottom:25px;line-height:1.6;word-break:keep-all;">${msg}</div>
        <div style="display:flex;gap:10px;justify-content:center;">
          ${isConfirm ? `<button id="btnCancel" style="flex:1;background:transparent;border:1px solid #666;color:#ccc;padding:12px;border-radius:4px;font-weight:bold;cursor:pointer;">취소</button>` : ''}
          <button id="btnOk" style="flex:1;background:var(--p);border:none;color:#000;font-weight:bold;padding:12px;border-radius:4px;cursor:pointer;">확인</button>
        </div>
      `;
      overlay.appendChild(box); document.body.appendChild(overlay);

      document.getElementById('btnOk').onclick = () => {
        document.body.removeChild(overlay); if(onConfirm) onConfirm();
      };
      if(isConfirm) {
        document.getElementById('btnCancel').onclick = () => document.body.removeChild(overlay);
      }
    }
  </script>
</body>
</html>
