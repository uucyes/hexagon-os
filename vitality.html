<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HEXAGON.OS - VITALITY MODULE</title>
  <style>
    :root { --p: #00ffcc; --bg: #050505; --card: #141414; --danger: #ff4444; }
    body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
    .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    
    .dashboard { background: var(--card); border: 1px solid #333; border-top: 3px solid var(--p); padding: 20px; width: 100%; max-width: 400px; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; text-align: center; box-shadow: 0 4px 15px rgba(0, 255, 204, 0.1); }
    
    .streak-title { font-size: 14px; color: #aaa; margin-bottom: 5px; font-weight: bold; }
    .streak-days { font-size: 48px; font-weight: 900; color: var(--p); margin-bottom: 15px; text-shadow: 0 0 10px rgba(0, 255, 204, 0.3); }
    
    .money-title { font-size: 12px; color: #888; }
    .money-amount { font-size: 28px; font-weight: bold; color: #fff; margin-bottom: 25px; }
    
    .target-box { background: #000; border: 1px dashed var(--p); padding: 15px; border-radius: 6px; margin-bottom: 5px; }
    .target-name { font-size: 16px; font-weight: bold; color: var(--p); margin-bottom: 10px; }
    
    .progress-bg { background: #333; height: 12px; border-radius: 6px; overflow: hidden; position: relative; }
    .progress-bar { background: var(--p); height: 100%; width: 0%; transition: width 1.5s; }
    .progress-text { font-size: 11px; color: #aaa; margin-top: 8px; text-align: right; font-weight: bold; }

    .btn-group { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 400px; }
    .btn-success { background: var(--p); color: #000; padding: 18px; border-radius: 6px; border: none; font-size: 15px; font-weight: 900; cursor: pointer; box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); transition: 0.2s; }
    .btn-success:active { transform: scale(0.98); }
    .btn-fail { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-fail:active { background: var(--danger); color: #000; }

    .lock-screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; max-width: 400px; padding: 40px 20px; border: 1px dashed var(--p); border-radius: 8px; text-align: center; box-sizing: border-box; }
    .lock-title { font-size: 18px; font-weight: bold; color: var(--p); margin-bottom: 10px; }
    .lock-msg { font-size: 14px; color: #aaa; line-height: 1.5; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="header">
    <b style="letter-spacing:2px; color:var(--p);">VITALITY.OS (V-VIP)</b>
    <span onclick="goHome()" style="color:#888; cursor:pointer;">[ EXIT ]</span>
  </div>
  
  <div id="loading" style="color:var(--p); padding:50px; font-weight:bold; text-align:center;">LOADING ASSETS...</div>
  
  <div id="lockScreen" class="lock-screen">
    <div class="lock-title">[ V-VIP 금고 잠금 완료 ]</div>
    <div class="lock-msg">오늘의 인내 수당이 이미 금고에 안전하게 확보되었습니다.<br>내일 다시 방문해 주십시오.</div>
    <button class="btn-success" style="padding: 10px 20px; width: auto;" onclick="goHome()">메인으로 복귀</button>
  </div>

  <div id="main" style="display:none; width:100%; max-width:400px; flex-direction:column; align-items:center;">
    <div class="dashboard">
      <div class="streak-title">NO SMOKING STREAK</div>
      <div class="streak-days"><span id="daysCount">0</span> DAYS</div>
      <div class="money-title">누적 럭셔리 시드머니 (SAVE)</div>
      <div class="money-amount">₩ <span id="saveAmount">0</span></div>
      <div class="target-box">
        <div style="font-size:11px; color:#aaa; margin-bottom:8px;">NEXT V-VIP TARGET</div>
        <div class="target-name" id="targetName">데이터 로딩중...</div>
        <div class="progress-bg"><div class="progress-bar" id="progressBar"></div></div>
        <div class="progress-text"><span id="progressPercent">0</span>% 확보 완료</div>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn-success" onclick="logSuccess()">[ ₩ 4,500 확보 및 오늘 인내 완료 ]</button>
      <button class="btn-fail" onclick="logFail()">[ 흡연 실패 - 시드머니 및 스트릭 파괴 ]</button>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyuMPRaNEUCrr3FLjPDuQBgdOM1GTsPD8KG9g1-AN01NPv9k75VqIGSEXggUvavniyh/exec";

    const DAILY_SAVING = 4500;
    const milestones = [
      { name: "니치 향수 (Creed / Le Labo)", cost: 135000 },
      { name: "명품 지갑 (Bottega / Gucci)", cost: 820000 },
      { name: "하이엔드 클러치 / 비스포크 수트", cost: 1642500 },
      { name: "드림 워치 (Omega / Tag Heuer)", cost: 4927500 },
      { name: "프리미엄 자동차 선수금", cost: 8212500 }
    ];

    let streakDays = 0; let totalSaved = 0;

    window.onload = function() {
      fetch(API_URL + "?action=getData")
        .then(response => response.json())
        .then(d => {
          document.getElementById('loading').style.display = 'none';
          
          if (d.locks && d.locks.vitality) {
            document.getElementById('lockScreen').style.display = 'flex';
            return; 
          }

          let startDateStr = d.vitalityStartDate || "2026-01-01"; 
          calculateAssets(startDateStr);
          document.getElementById('main').style.display = 'flex';
        })
        .catch(err => {
          document.getElementById('loading').innerText = "통신 오류가 발생했습니다.";
        });
    };

    function calculateAssets(startStr) {
      const start = new Date(startStr); start.setHours(0,0,0,0);
      const now = new Date(); now.setHours(0,0,0,0);
      const diffTime = Math.abs(now - start);
      streakDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1; 
      totalSaved = streakDays * DAILY_SAVING;
      
      document.getElementById('daysCount').innerText = streakDays;
      document.getElementById('saveAmount').innerText = totalSaved.toLocaleString();
      
      let currentTarget = milestones[milestones.length - 1];
      for(let i=0; i<milestones.length; i++) {
        if(totalSaved < milestones[i].cost) { currentTarget = milestones[i]; break; }
      }
      document.getElementById('targetName').innerText = currentTarget.name + " (₩ " + currentTarget.cost.toLocaleString() + ")";
      let percent = (totalSaved / currentTarget.cost) * 100; if(percent > 100) percent = 100;
      
      setTimeout(() => {
        document.getElementById('progressBar').style.width = percent + "%";
        document.getElementById('progressPercent').innerText = percent.toFixed(1);
      }, 300);
    }

    // ── 자체 팝업 모달(Custom Modal) 엔진 ──
    function showCustomModal(title, msg, isConfirm, onConfirm) {
      const overlay = document.createElement('div');
      overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:9999;display:flex;justify-content:center;align-items:center;";
      const box = document.createElement('div');
      box.style.cssText = "background:#141414;border:1px solid #333;border-top:4px solid var(--p);padding:25px;border-radius:8px;width:80%;max-width:320px;text-align:center;box-shadow:0 0 20px rgba(0,0,0,0.5);";
      
      box.innerHTML = `
        <div style="font-size:18px;font-weight:bold;color:var(--p);margin-bottom:15px;letter-spacing:1px;">${title}</div>
        <div style="font-size:14px;color:#ccc;margin-bottom:25px;line-height:1.6;word-break:keep-all;">${msg}</div>
        <div style="display:flex;gap:10px;justify-content:center;">
          ${isConfirm ? `<button id="btnCancel" style="flex:1;background:transparent;border:1px solid #666;color:#ccc;padding:12px;border-radius:4px;font-weight:bold;cursor:pointer;">취소</button>` : ''}
          <button id="btnOk" style="flex:1;background:var(--p);border:none;color:#000;font-weight:bold;padding:12px;border-radius:4px;cursor:pointer;">확인</button>
        </div>
      `;
      overlay.appendChild(box); document.body.appendChild(overlay);

      document.getElementById('btnOk').onclick = () => {
        document.body.removeChild(overlay); if(onConfirm) onConfirm();
      };
      if(isConfirm) {
        document.getElementById('btnCancel').onclick = () => document.body.removeChild(overlay);
      }
    }

    function logSuccess() {
      document.body.style.cursor = 'wait';
      const payload = { category: '활력', content: '금연 성공 및 자산 확보', value: 4500, feedback: '성공' };

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "logActivity", payload: payload })
      })
      .then(response => response.json())
      .then(data => {
        document.body.style.cursor = 'default';
        if(data.success) {
          showCustomModal("자산 확보 완료", "명품을 향한 자산 4,500원이 추가로 확보되었습니다.<br>메인으로 복귀합니다.", false, goHome);
        } else {
          showCustomModal("오류", "기록 실패: " + data.error, false);
        }
      })
      .catch(err => {
        document.body.style.cursor = 'default';
        showCustomModal("오류", "통신 문제로 기록을 저장하지 못했습니다.", false);
      });
    }

    function logFail() {
      showCustomModal("경고: 흡연 스탯 파괴", "정말 흡연하셨습니까?\n그동안 누적된 명품 시드머니와 연속 기록이 즉시 파괴됩니다. 진행하시겠습니까?", true, () => {
        document.body.style.cursor = 'wait';
        
        // 1. 실패 데이터 로그 기록
        const logPayload = { category: '활력', content: '흡연 실패', value: 0, feedback: '실패' };
        fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "logActivity", payload: logPayload }) })
        .then(() => {
          // 2. 서버 기준정보 리셋
          return fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "resetVitalityData" }) });
        })
        .then(response => response.json())
        .then(data => {
          document.body.style.cursor = 'default';
          showCustomModal("데이터 초기화", "모든 기록과 자산이 초기화되었습니다. 내일부터 다시 시작하십시오.", false, goHome);
        })
        .catch(err => {
          document.body.style.cursor = 'default';
          showCustomModal("오류", "통신 오류로 초기화를 완료하지 못했습니다.", false, goHome);
        });
      });
    }

    function goHome() {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
